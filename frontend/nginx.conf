server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        client_max_body_size 500m;
    }

    location /media/ {
        proxy_pass http://api:8000;
    }

    location / {
        try_files $uri /index.html;
    }
}
