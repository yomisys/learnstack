# Local verification override — ports 8000/3000 are already used by another
# stack on this machine (gll). LearnStack uses 8020 (API) / 3020 (frontend)
# locally. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
services:
  api:
    ports: !override
      - "8020:8000"

  frontend:
    ports: !override
      - "3020:80"
