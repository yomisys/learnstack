# Local verification override — ports 8000/3000 are already used by another
# stack on this machine (gll). LearnStack uses 8020 (API) / 3020 (frontend)
# locally. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
services:
  api:
    ports: !override
      - "8020:8000"

  frontend:
    ports: !override
      - "3020:80"

  # Published locally only for debugging (console at :9031). 9020/9021 are
  # already used by the MNAIR stack's own MinIO on this machine, so this
  # uses 9030/9031 instead. The api container reaches MinIO via the
  # internal docker network regardless of what's published to the host.
  minio:
    ports:
      - "9030:9000"
      - "9031:9001"
