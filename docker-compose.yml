services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: learnstack
      POSTGRES_PASSWORD: learnstack
      POSTGRES_DB: learnstack
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnstack"]
      interval: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      LEARNSTACK_DATABASE_URL: postgresql+psycopg://learnstack:learnstack@db:5432/learnstack
      LEARNSTACK_JWT_SECRET: ${LEARNSTACK_JWT_SECRET:-change-me}
      LEARNSTACK_CORS_ORIGINS: http://localhost:3000
    volumes:
      - media:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
  media:
